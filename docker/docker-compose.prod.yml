# AIOSOL - Production Docker Compose
# Created by: Nila (DevOps Engineer)

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: aiosol_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # Redis
  redis:
    image: redis:7-alpine
    container_name: aiosol_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: aiosol_backend
    restart: always
    env_file:
      - ../backend/.env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - web
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000

  # Celery Worker
  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: aiosol_celery_worker
    restart: always
    env_file:
      - ../backend/.env.prod
    depends_on:
      - backend
      - redis
    networks:
      - internal
    command: celery -A app.workers.celery_app worker --loglevel=warning --concurrency=4

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: aiosol_celery_beat
    restart: always
    env_file:
      - ../backend/.env.prod
    depends_on:
      - celery_worker
    networks:
      - internal
    command: celery -A app.workers.celery_app beat --loglevel=warning

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: aiosol_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ../frontend/dist:/var/www/html:ro
    depends_on:
      - backend
    networks:
      - web

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
